    <style>
      * { box-sizing: border-box; }

      body {
        background: #0A0A0A;
        color: #e4e4e4;
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
      }

      h1, h2, h3, h4, h5, h6,
      .font-grotesk { font-family: 'Space Grotesk', sans-serif; }

      /* Blueprint grid background */
      .blueprint-bg {
        background-color: #0A0A0A;
        background-image:
          linear-gradient(rgba(88,226,31,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(88,226,31,0.04) 1px, transparent 1px),
          linear-gradient(rgba(88,226,31,0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(88,226,31,0.02) 1px, transparent 1px);
        background-size: 80px 80px, 80px 80px, 16px 16px, 16px 16px;
        background-position: -1px -1px, -1px -1px, -1px -1px, -1px -1px;
      }

      /* Signature gradient */
      .sig-gradient {
        background: linear-gradient(135deg, #3eb512 0%, #00c1fd 100%);
      }

      .sig-gradient-text {
        background: linear-gradient(135deg, #3eb512 0%, #00c1fd 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Glow effects */
      .glow-green {
        box-shadow: 0 0 20px rgba(88,226,31,0.3), 0 0 40px rgba(88,226,31,0.1);
      }
      .neon-glow-primary {
        box-shadow: 0 0 15px rgba(88, 226, 31, 0.4);
      }
      .neon-border-focus:focus-within {
        border-bottom-color: #00C1FD;
        filter: drop-shadow(0 4px 6px rgba(0, 193, 253, 0.3));
      }
      .cyber-glow { box-shadow: 0 0 15px rgba(88, 226, 31, 0.4); }
      .cyber-glow-cyan { box-shadow: 0 0 15px rgba(0, 193, 253, 0.4); }
      .timeline-line { background: linear-gradient(to bottom, #00C1FD 0%, transparent 100%); width: 2px; }
      .neon-border-active {
        box-shadow: 0 0 10px rgba(88, 226, 31, 0.4);
        border-color: rgba(88, 226, 31, 0.6);
      }
      .glass-panel {
        background: rgba(26, 26, 26, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(228, 228, 228, 0.1);
      }
      .glass-card {
        background: rgba(26, 26, 26, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(228, 228, 228, 0.1);
      }
      .glow-cyan {
        box-shadow: 0 0 20px rgba(0,193,253,0.3), 0 0 40px rgba(0,193,253,0.1);
      }
      .text-glow-green {
        text-shadow: 0 0 10px rgba(88,226,31,0.5);
      }

      /* Material Symbols */
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        user-select: none;
        vertical-align: middle;
        line-height: 1;
      }
      .material-symbols-outlined.filled {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .icon-sm { font-size: 18px; }
      .icon-md { font-size: 24px; }
      .icon-lg { font-size: 32px; }
      .icon-xl { font-size: 48px; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #131313; }
      ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #58e21f; }

      /* Input underline style */
      .input-underline {
        background: transparent;
        border: none;
        border-bottom: 1px solid #2a2a2a;
        border-radius: 0;
        color: #e4e4e4;
        outline: none;
        padding: 0.5rem 0;
        width: 100%;
        font-family: 'Inter', sans-serif;
        font-size: 0.875rem;
        transition: border-color 0.2s;
      }
      .input-underline:focus { border-bottom-color: #58e21f; }
      .input-underline::placeholder { color: #4a4a4a; }

      /* Input box style (admin) */
      .input-box {
        background: #131313;
        border: 1px solid #2a2a2a;
        border-radius: 0.125rem;
        color: #e4e4e4;
        outline: none;
        padding: 0.625rem 0.75rem;
        width: 100%;
        font-family: 'Inter', sans-serif;
        font-size: 0.875rem;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .input-box:focus {
        border-color: #58e21f;
        box-shadow: 0 0 0 1px rgba(88,226,31,0.2);
      }
      .input-box::placeholder { color: #4a4a4a; }

      /* Status dots */
      .dot-green { background: #58e21f; box-shadow: 0 0 6px #58e21f; }
      .dot-red { background: #ff4444; box-shadow: 0 0 6px #ff4444; }
      .dot-yellow { background: #ffd600; box-shadow: 0 0 6px #ffd600; }
      .dot-cyan { background: #00c1fd; box-shadow: 0 0 6px #00c1fd; }
      .dot-gray { background: #4a4a4a; }

      /* Accordion */
      .accordion-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }
      .accordion-content.open {
        max-height: 600px;
      }

      /* Sidebar */
      .sidebar-nav-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.625rem 1rem;
        border-radius: 0.125rem;
        font-size: 0.75rem;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #888;
        cursor: pointer;
        transition: all 0.15s;
        border-left: 2px solid transparent;
      }
      .sidebar-nav-item:hover {
        color: #58e21f;
        background: rgba(88,226,31,0.05);
        border-left-color: rgba(88,226,31,0.3);
      }
      .sidebar-nav-item.active {
        color: #58e21f;
        background: rgba(88,226,31,0.08);
        border-left-color: #58e21f;
      }

      /* Custom checkbox */
      .pm-checkbox {
        width: 16px; height: 16px;
        border: 1px solid #2a2a2a;
        border-radius: 2px;
        background: #131313;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        transition: all 0.15s;
      }
      .pm-checkbox.checked {
        background: #58e21f;
        border-color: #58e21f;
      }

      /* Animate pulse */
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 10px rgba(88,226,31,0.3); }
        50% { box-shadow: 0 0 20px rgba(88,226,31,0.6); }
      }
      .animate-glow { animation: pulse-glow 2s ease-in-out infinite; }

      /* Card hover */
      .card-hover {
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .card-hover:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(88,226,31,0.1);
      }
    </style>

  </head>
