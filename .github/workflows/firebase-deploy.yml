name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAINTECH_V_1 }}
          channelId: live
          projectId: maintech-v-1

      # Requires the service account to have the "Firebase Rules Admin" and
      # "Service Usage Viewer" IAM roles. Non-blocking so a permissions gap
      # doesn't mark the hosting deploy as failed — rules can also be updated
      # manually in the Firebase console (Firestore Database → Rules).
      - name: Deploy Firestore rules (best effort)
        continue-on-error: true
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          if npx firebase-tools deploy --only firestore:rules --project maintech-v-1 --non-interactive; then
            echo "Firestore rules deployed."
          else
            echo "::warning::Firestore rules were NOT deployed (service account lacks permission). Grant it 'Firebase Rules Admin' + 'Service Usage Viewer' in Google Cloud IAM, or publish firestore.rules manually in the Firebase console."
            exit 1
          fi
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAINTECH_V_1 }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
